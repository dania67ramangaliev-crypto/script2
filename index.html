<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>.</title>
<link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Arimo',Arial,sans-serif}
body{background:#000;min-height:100vh;overflow:hidden;color:#fff}

.admin{
    display:none;
    padding:30px;
    max-width:950px;
    margin:0 auto;
    animation:fade .4s ease;
}
@keyframes fade{from{opacity:0;transform:translateY(-15px)}to{opacity:1;transform:translateY(0)}}

h2{
    color:#fff;
    margin-bottom:25px;
    font-size:28px;
    font-weight:700;
    letter-spacing:2px;
    border-bottom:2px solid #fff;
    padding-bottom:15px;
}
h3{
    color:#fff;
    margin:20px 0 12px 0;
    font-size:15px;
    font-weight:600;
    letter-spacing:1.5px;
    text-transform:uppercase;
}

textarea{
    width:100%;
    height:320px;
    background:#000;
    color:#fff;
    border:1px solid #fff;
    padding:15px;
    font-family:'Arimo',Arial,monospace;
    font-size:13px;
    resize:vertical;
    outline:none;
    line-height:1.5;
}
textarea:focus{
    border-color:#fff;
    box-shadow:0 0 0 1px #fff;
}

button{
    margin-top:12px;
    padding:12px 24px;
    background:#fff;
    color:#000;
    border:1px solid #fff;
    font-weight:600;
    cursor:pointer;
    margin-right:8px;
    font-family:'Arimo',Arial,sans-serif;
    font-size:13px;
    letter-spacing:1px;
    text-transform:uppercase;
    transition:all .2s;
}
button:hover{
    background:#000;
    color:#fff;
}
.ghost{background:#000;color:#fff}
.ghost:hover{background:#fff;color:#000}

.info{
    margin-top:15px;
    padding:15px;
    background:#111;
    border:1px solid #fff;
    font-size:12px;
    color:#fff;
    word-break:break-all;
    line-height:1.6;
}

.tag{
    display:inline-block;
    padding:6px 14px;
    background:#000;
    border:1px solid #fff;
    color:#fff;
    margin:4px;
    font-size:12px;
    font-weight:500;
    letter-spacing:0.5px;
}
.tag.owner{
    background:#fff;
    color:#000;
}
.tag a{
    cursor:pointer;
    margin-left:8px;
    font-weight:700;
    padding:0 4px;
}
.tag a:hover{opacity:0.6}

input{
    background:#000;
    border:1px solid #fff;
    color:#fff;
    padding:11px 15px;
    font-family:'Arimo',Arial,sans-serif;
    outline:none;
    width:250px;
    font-size:13px;
}
input:focus{
    box-shadow:0 0 0 1px #fff;
}

.step{
    background:#000;
    border:1px solid #fff;
    padding:15px;
    margin:15px 0;
    font-size:13px;
    color:#fff;
    line-height:1.6;
}
.step b{letter-spacing:1px}

.divider{
    height:1px;
    background:#fff;
    margin:25px 0;
    opacity:0.3;
}

::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:#000}
::-webkit-scrollbar-thumb{background:#fff}
::-webkit-scrollbar-thumb:hover{background:#ccc}
</style>
</head>
<body>

<div class="admin" id="panel">
    <h2>SKEITIKADMIN — HUB</h2>

    <h3>◆ WHITELIST</h3>
    <div id="wlDisplay"></div>
    <div style="margin-top:12px">
        <input id="addNick" placeholder="Roblox Username..." onkeypress="if(event.key==='Enter')addNick()">
        <button onclick="addNick()">+ ADD</button>
    </div>

    <div class="divider"></div>

    <h3>◆ SCRIPT EDITOR</h3>
    <textarea id="code" spellcheck="false"></textarea>
    <br>
    <button onclick="generate()">◆ GENERATE</button>
    <button class="ghost" onclick="copyLS()">◆ COPY LOADSTRING</button>
    <button class="ghost" onclick="closePanel()">✕ CLOSE</button>

    <div class="info" id="lsBox"></div>

    <div class="divider"></div>

    <h3>◆ FINAL CODE — COPY TO GITHUB</h3>
    <div class="step">
        <b>INSTRUCTIONS:</b><br>
        1. Copy the code below<br>
        2. Click "OPEN GITHUB" button<br>
        3. Select all (Ctrl+A) → Paste (Ctrl+V)<br>
        4. Scroll down → Click "Commit changes"
    </div>
    <textarea id="finalCode" readonly style="height:280px"></textarea>
    <button onclick="copyFinal()">◆ COPY CODE</button>
    <button class="ghost" onclick="openGitHub()">◆ OPEN GITHUB</button>
</div>

<script>
// ============ CONFIG ============
const GITHUB_USER = "dania67ramangaliev-crypto";
const REPO = "script2";
const SCRIPT_FILE = "script.lua";

// ============ DATA ============
let whitelist = JSON.parse(localStorage.getItem('wl') || '["SkeitikAdmin"]');
let scriptCode = localStorage.getItem('sc') || defaultScript();

function defaultScript(){
return `-- Your script here (whitelist checked above)

local character = player.Character or player.CharacterAdded:Wait()
local humanoid = character:WaitForChild("Humanoid")

humanoid.WalkSpeed = 40
print("[Hub] WalkSpeed set to 40 for " .. player.Name)

-- Auto-restore after respawn
player.CharacterAdded:Connect(function(char)
    local h = char:WaitForChild("Humanoid")
    h.WalkSpeed = 40
end)`;
}

// ============ SECRET COMBO A + O ============
let pressed={}, isOpen=false;
document.addEventListener('keydown',e=>{
    pressed[e.key.toLowerCase()]=true;
    if(pressed['a']&&pressed['o'])openPanel();
});
document.addEventListener('keyup',e=>{pressed[e.key.toLowerCase()]=false});

function openPanel(){
    if(isOpen)return; isOpen=true;
    document.getElementById('panel').style.display='block';
    document.getElementById('code').value=scriptCode;
    updateWL();
    updateLS();
    generate();
}
function closePanel(){
    isOpen=false;
    document.getElementById('panel').style.display='none';
}

// ============ WHITELIST ============
function updateWL(){
    document.getElementById('wlDisplay').innerHTML=
        whitelist.map(n=>{
            const isOwner = n==='SkeitikAdmin';
            return `<span class="tag ${isOwner?'owner':''}">${isOwner?'★ ':''}${n}${!isOwner?` <a onclick="delNick('${n}')">✕</a>`:''}</span>`;
        }).join('');
}
function addNick(){
    const i=document.getElementById('addNick');
    const n=i.value.trim();
    if(!n)return;
    if(whitelist.map(v=>v.toLowerCase()).includes(n.toLowerCase()))return alert('This user is already in whitelist!');
    whitelist.push(n);
    save();
    i.value='';
    updateWL();
    generate();
}
function delNick(n){
    if(n==='SkeitikAdmin')return alert('Cannot remove owner!');
    whitelist=whitelist.filter(v=>v!==n);
    save();
    updateWL();
    generate();
}
function save(){
    localStorage.setItem('wl',JSON.stringify(whitelist));
    localStorage.setItem('sc',document.getElementById('code').value);
}

// ============ GENERATE ============
function generate(){
    scriptCode=document.getElementById('code').value;
    save();
    const wl='{\n'+whitelist.map(v=>`    "${v}"`).join(',\n')+'\n}';
    const full=`-- ═══════════════════════════════════════
-- SKEITIKADMIN HUB — Auto Generated
-- ═══════════════════════════════════════

local Players = game:GetService("Players")
local player = Players.LocalPlayer

local whitelist = ${wl}

-- Access check
local allowed = false
for _, name in ipairs(whitelist) do
    if player.Name:lower() == name:lower() then
        allowed = true
        break
    end
end

if not allowed then
    warn("[Hub] Access Denied: " .. player.Name)
    return
end

print("[Hub] Welcome " .. player.Name)

-- ═══════════════════════════════════════
-- USER SCRIPT
-- ═══════════════════════════════════════

${scriptCode}`;
    document.getElementById('finalCode').value=full;
}

function copyFinal(){
    document.getElementById('finalCode').select();
    document.execCommand('copy');
    alert('Code copied!\n\nNow paste it into script.lua on GitHub');
}

// ============ LOADSTRING ============
function updateLS(){
    const url=`https://raw.githubusercontent.com/${GITHUB_USER}/${REPO}/main/${SCRIPT_FILE}`;
    document.getElementById('lsBox').innerHTML=
        '<b>LOADSTRING FOR ROBLOX:</b><br><br>' +
        'loadstring(game:HttpGet("' + url + '"))()';
}
function copyLS(){
    const url=`https://raw.githubusercontent.com/${GITHUB_USER}/${REPO}/main/${SCRIPT_FILE}`;
    const ls='loadstring(game:HttpGet("'+url+'"))()';
    navigator.clipboard.writeText(ls);
    alert('Loadstring copied!\n\n'+ls);
}
function openGitHub(){
    window.open(`https://github.com/${GITHUB_USER}/${REPO}/edit/main/${SCRIPT_FILE}`,'_blank');
}

// ============ PROTECTION ============
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('keydown',e=>{
    if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&'IJCijc'.includes(e.key))||(e.ctrlKey&&'UuSs'.includes(e.key)))e.preventDefault();
});
</script>
</body>
</html>
